name: Sync icons
on:
  # Allow workflow to be run manually
  workflow_dispatch: {}
  schedule:
    # Run at least once per week
    - cron: '20 2 * * WED'
permissions: {}
env:
  svg2xml_version: 1.0.2
jobs:
  types:
    name: Sync icons
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up cache
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Setup svg2xml
        run: |
          ./.github/workflows/scripts/svg2xml.sh ${{ env.svg2xml_version }}
          echo "$PWD/svg2xml-${{ env.svg2xml_version }}/bin" >> $GITHUB_PATH
      - name: Sync icons
        run: yarn sync:icons
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
      - name: Generate files
        run: yarn build
      - name: Clean up
        run: rm -r svg2xml*
      - name: Create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          # CI won't run if we use the default GITHUB_TOKEN
          token: ${{ secrets.ELEMENT_BOT_TOKEN }}
          commit-message: Sync icons from Figma
          title: Sync icons from Figma
          body: New data is available from [Compound Icons](https://www.figma.com/design/gkNXqPoiJhEv2wt0EJpew4/Compound-Icons).
          branch: actions/sync-tokens
          delete-branch: true
