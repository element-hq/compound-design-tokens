name: Release npm package
on:
  workflow_dispatch:
    inputs:
      version-bump:
        description: The scale of the version bump required for semver compatibility
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
concurrency: release
permissions:
  id-token: write # Allow npm to authenticate as a trusted publisher
  contents: write # Allow creating a release
jobs:
  release:
    name: "Release & Publish"
    runs-on: ubuntu-latest
    steps:
      - name: 🧮 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.ELEMENT_BOT_TOKEN }}
          persist-credentials: false

      - name: 🔧 Set up node environment
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"
          cache: "yarn"

      - name: 🛠️ Setup
        run: yarn install --pure-lockfile

      - name: 👊 Bump version
        run: |
          yarn version --no-git-tag-version --${GITHUB_EVENT_INPUTS_VERSION_BUMP}
          yarn format --write
          git config --global user.name 'ElementRobot'
          git config --global user.email 'releases@riot.im'
          git commit -am "${GITHUB_EVENT_INPUTS_VERSION_BUMP} version bump"
          git push
        env:
          GITHUB_EVENT_INPUTS_VERSION_BUMP: ${{ github.event.inputs.version-bump }}

      - name: 🚀 Publish to npm
        # We use npm since Yarn Classic doesn't support trusted publishing
        run: |
          npm publish --provenance --ignore-scripts
          echo "VERSION=$(jq '.version' --raw-output package.json)" >> "$GITHUB_ENV"

      - name: 🧬 Create release
        # TODO: This action has been archived, find a new one.
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.VERSION }}
          release_name: Release ${{ env.VERSION }}
          body: ${{ env.VERSION }} Release
          draft: false
          prerelease: false
